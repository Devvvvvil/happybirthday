<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Grandba</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle at top,#000,#111);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:"Poppins",sans-serif;
  overflow:hidden;
}

.screen{
  background: white;
  padding:55px 60px;
  border-radius:22px;
  box-shadow:0 0 30px black;
  width:540px;
  min-height:360px;
  display:none;
  text-align:center;
  border:2px solid #000;
}
.screen.active{display:block;}

h1{font-size:32px;color:#000;text-align:center;}
p{font-size:18px;color:#000;white-space:pre-line;text-align:center;}

.main-img{
  width:240px;
  border-radius:18px;
  margin-top:15px;
}

button{
  padding:12px 28px;
  font-size:18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
  margin:10px;
}

#trollBtn{
  background:#000;
  color:white;
  position:fixed;
  top:70%;
  left:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">
  <h1 id="msg">Happy Birthday Grandba!</h1>
  <img src="photo.png" class="main-img" alt="Grandba">
</div>

<button id="trollBtn">Click me</button>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
  <p id="arabicMessage">
    كل عام وانت بخير يا جدي<br>
    عسى سنينك كلها تمر بسعادة وفرح وتحقق أهدافك عام ورا عام<br>
    وتوصل للي تتمناه يا حب<br>
    ومنور الـ٢١ يا جدي<br>
    المرة الجاية نوديك دار العجزة<br>
    والله يسعدك على كل مرة فرحتنا فيها يا جامد<br>
    وبس والله كولش أحبك
  </p>
</div>

<script>
const trollBtn = document.getElementById("trollBtn");
const msg = document.getElementById("msg");
const screen1 = document.getElementById("screen1");
const screen2 = document.getElementById("screen2");

const trollTexts = [
  "Nice aim, Grandba.",
  "Wtf Grandba just press it??",
  "Bro... so now you're 21 and still can't aim?",
  "Almost had it.",
  "Grandba... are you lagging?",
  "Try again, old man!"
];

let tries = 0;
let stopTrolling = false;

trollBtn.addEventListener("mouseenter", () => {
  if(stopTrolling) return; // Stop moving after 10 tries

  const btnW = trollBtn.offsetWidth;
  const btnH = trollBtn.offsetHeight;
  const winW = window.innerWidth;
  const winH = window.innerHeight;

  const x = Math.random() * (winW - btnW);
  const y = Math.random() * (winH - btnH);
  trollBtn.style.left = x + "px";
  trollBtn.style.top = y + "px";
  trollBtn.style.transform = "translate(0,0)";

  if(tries < 10){
    msg.textContent = trollTexts[Math.floor(Math.random() * trollTexts.length)];
    tries++;
  } else {
    stopTrolling = true;
    msg.textContent = "Ok ok now just press it!";
  }
});

trollBtn.addEventListener("click", () => {
  // Hide screen 1 and show screen 2
  screen1.classList.remove("active");
  trollBtn.style.display = "none";
  screen2.classList.add("active");

  // Typewriter effect for Arabic message
  const messageEl = document.getElementById("arabicMessage");
  const fullText = messageEl.textContent; // Get the full text
  messageEl.textContent = ""; // Clear text to start typing

  let i = 0;
  const typingSpeed = 50; // milliseconds per character

  function typeLetter() {
    if (i < fullText.length) {
      messageEl.textContent += fullText[i];
      i++;
      setTimeout(typeLetter, typingSpeed);
    }
  }
  typeLetter();

  // Optional: floating balloons
  for(let i=0;i<15;i++){
    const balloon = document.createElement("div");
    balloon.style.width = "50px";
    balloon.style.height = "70px";
    balloon.style.backgroundColor = `hsl(${Math.random()*360},70%,60%)`;
    balloon.style.borderRadius = "50% 50% 50% 50% / 60% 60% 40% 40%";
    balloon.style.position = "fixed";
    balloon.style.left = Math.random()*100 + "vw";
    balloon.style.bottom = "-100px";
    balloon.style.opacity = 0.8;
    balloon.style.animation = `floatUp ${5+Math.random()*5}s linear infinite`;
    document.body.appendChild(balloon);
  }
});

// Balloon animation
const style = document.createElement('style');
style.innerHTML = `
@keyframes floatUp {
  0% {transform: translateY(0) rotate(0deg);}
  100% {transform: translateY(-110vh) rotate(360deg);}
}`;
document.head.appendChild(style);
</script>

</body>
</html>
